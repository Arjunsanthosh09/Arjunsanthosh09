  <text x="480" y="55" font-family="monospace" font-size="11" fill="#3fb950" opacity="0.35">const dev = new Arjun();</text>
  <text x="490" y="75" font-family="monospace" font-size="11" fill="#58a6ff" opacity="0.35">dev.build("scalable apps");</text>
  <text x="500" y="95" font-family="monospace" font-size="11" fill="#f78166" opacity="0.35">// Flutter · Flask · SQL</text>
  <text x="490" y="115" font-family="monospace" font-size="11" fill="#e3b341" opacity="0.30">dev.deploy(production);</text>

  <rect x="30" y="155" width="60" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>
  <circle cx="620" cy="50" r="40" fill="#58a6ff" opacity="0.04"/>
  <circle cx="620" cy="50" r="28" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="620" cy="50" r="16" fill="none" stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>

  <text x="40" y="100" font-family="'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Arjun Santhosh</text>
  <text x="42" y="130" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#8b949e">Full-Stack Developer · Flutter Specialist · MCA Candidate</text>
  <text x="42" y="175" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#58a6ff" opacity="0.85">Building impactful software · One commit at a time</text>
